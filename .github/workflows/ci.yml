name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Packaging safety: verify npm tarball metadata
  packaging-check:
    name: Packaging Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify no default DATAVERSE_URL
        run: |
          if grep -r "DEFAULT_DATAVERSE_URL\s*=" src/ 2>/dev/null | grep -v "undefined"; then
            echo "FAIL: Hardcoded DEFAULT_DATAVERSE_URL found"
            exit 1
          fi
          echo "PASS: No hardcoded DEFAULT_DATAVERSE_URL"
      
      - name: Dry-run npm pack and check for excluded directories
        run: |
          npm pack --dry-run | tee /tmp/npm-pack-dry-run.txt
          
          # Verify that .squad/, .copilot/, and other sensitive dirs are not in the tarball
          if grep -E '\.squad/|\.copilot/' /tmp/npm-pack-dry-run.txt; then
            echo "FAIL: .squad/ or .copilot/ directories would be included in tarball"
            exit 1
          fi
          
          # Check for common build artifacts that should be ignored
          if grep -E 'dist/|dvq-bundle\.cjs|\.github/|node_modules/' /tmp/npm-pack-dry-run.txt | grep -v '.github/agents'; then
            echo "WARN: Unexpected files may be included; check package.json 'files' field"
          fi
          
          echo "PASS: npm tarball structure safe"

  # Linting
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint --if-present || echo "ESLint not yet configured"
      
      - name: Check formatting
        run: npm run format:check --if-present || echo "Prettier not yet configured"

  # Building and testing across Node LTS versions
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build --if-present || echo "Build step not configured"
      
      - name: Run tests
        run: npm test
      
      - name: Upload coverage
        if: matrix.node == '20'
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
