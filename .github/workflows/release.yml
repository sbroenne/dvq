name: Release to npm

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Pre-Publish Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci
      
      - name: Run full test suite
        run: npm test
      
      - name: Build
        run: npm run build --if-present
      
      - name: Create tarball and verify content
        run: |
          npm pack --pack-destination /tmp/
          TARBALL=$(ls /tmp/sbroenne-dvq-*.tgz | head -1)
          
          # Extract and verify required package contents
          cd /tmp
          tar -xzf "$TARBALL"
          
          # Verify expected files present
          if [ ! -f package/package.json ]; then
            echo "FAIL: package.json missing from tarball"
            exit 1
          fi
          
          if [ ! -f package/README.md ]; then
            echo "WARN: README.md missing (consider adding for npm discoverability)"
          fi
          
          if [ ! -f package/LICENSE ]; then
            echo "FAIL: LICENSE missing from tarball"
            exit 1
          fi
          
          # Verify sensitive dirs excluded
          if [ -d package/.squad ] || [ -d package/.copilot ]; then
            echo "FAIL: .squad/ or .copilot/ present in tarball"
            exit 1
          fi
          
          echo "PASS: Tarball verification complete"
      
      - name: Verify repository metadata
        run: |
          # Ensure package.json has correct scoped name
          if ! grep -q '"name".*"@sbroenne/dvq"' package.json; then
            echo "FAIL: package.json name field must be @sbroenne/dvq"
            exit 1
          fi
          
          # Ensure repository URL is correct
          if ! grep -q '"url".*"sbroenne/dvq"' package.json; then
            echo "WARN: package.json repository URL may not reference sbroenne/dvq"
          fi
          
          # Ensure no default DATAVERSE_URL
          if grep -r "DEFAULT_DATAVERSE_URL\s*=" src/ 2>/dev/null | grep -v "undefined"; then
            echo "FAIL: Hardcoded DATAVERSE_URL found"
            exit 1
          fi
          
          echo "PASS: Metadata verification complete"

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build --if-present
      
      - name: Publish to npm
        run: npm publish --provenance --access public
      
      - name: Post-publish verification
        run: |
          echo "Waiting for npm registry sync..."
          sleep 5
          
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          
          echo "Verifying $PACKAGE_NAME@$PACKAGE_VERSION on npm..."
          
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" 2>/dev/null; then
            echo "SUCCESS: Package published and visible on npm"
          else
            echo "WARN: Package not yet visible on npm (may take a moment)"
          fi

  release-notes:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
